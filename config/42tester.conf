server {
	listen 127.0.0.1:9999;

	error_page 404 /errors/404.html;
	error_page 500 /errors/500.html;

	client_max_body_size 200M;

	location / {
		methods GET; # / must answer to GET request ONLY
		root www;
		index index.html;
		autoindex off;
	}

	location /post_body {
		methods POST;
		root www;
		index index.html;
		autoindex off;
	}

	location /directory/ {
		# GET for static browsing + POST for .bla/.py CGI tests
		methods GET POST;
		root YoupiBanane;
		index youpi.bad_extension;
		autoindex off;
		cgi .bla /home/carlos-j/Desktop/42Webserver/cgi_tester;
		cgi .py /home/carlos-j/Desktop/42Webserver/cgi_tester;
	}
}
