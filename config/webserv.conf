server {
    listen 127.0.0.1:8080;
    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;
    client_max_body_size 10M;

    location / {
        methods GET POST;
        root /var/www/html;
        index index.html;
        autoindex off;
    }

    location /upload {
        methods POST DELETE;
        root /var/www/uploads;
        upload_store /var/www/uploads;
    }

    location /old-page {
        return 301 /new-page;
    }

    location /cgi-bin {
        methods GET POST;
        root /var/www/cgi-bin;
        cgi .php /usr/bin/php-cgi;
        cgi .py /usr/bin/python3;
    }
}

server {
    listen 8081;
    error_page 404 /errors/404.html;
    client_max_body_size 1M;

    location / {
        methods GET;
        root /var/www/site2;
        index index.html;
        autoindex on;
    }
}
